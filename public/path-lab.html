<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TransitChaser Path Lab v2</title>

<style>
body {
  margin:0;
  background:#050914;
  color:#e8eefc;
  font-family:system-ui;
}

header {
  padding:16px 20px;
  background:#0f172a;
  border-bottom:1px solid #1e293b;
}

.layout {
  display:grid;
  grid-template-columns:320px 1fr;
  height:calc(100vh - 60px);
}

.panel {
  padding:16px;
  border-right:1px solid #1e293b;
}

input, select {
  width:100%;
  padding:8px;
  margin-top:6px;
  background:#0b1220;
  color:white;
  border:1px solid #334155;
  border-radius:8px;
}

button {
  width:100%;
  margin-top:10px;
  padding:10px;
  background:#2563eb;
  border:0;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

canvas {
  width:100%;
  height:100%;
}
</style>
</head>

<body>

<header>
  <h2>TransitChaser Path Lab v2</h2>
</header>

<div class="layout">

<div class="panel">
  <label>Latitude</label>
  <input id="lat" value="-33.918705">

  <label>Longitude</label>
  <input id="lon" value="151.197647">

  <label>Radius (km)</label>
  <input id="radius" value="30">

  <label>Target Type</label>
  <select id="targetType">
    <option value="moon">Moon</option>
    <option value="sun">Sun</option>
  </select>

  <label>Azimuth</label>
  <input id="az" value="343">

  <label>Altitude</label>
  <input id="alt" value="44">

  <button onclick="capture()">Capture Sample</button>
  <button onclick="clearData()">Clear</button>

  <div id="status">Ready</div>
</div>

<canvas id="c"></canvas>

</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let tracks = {}; // callsign -> history

function toRad(d){return d*Math.PI/180;}

function haversine(lat1,lon1,lat2,lon2){
  const R=6371000;
  const dLat=toRad(lat2-lat1);
  const dLon=toRad(lon2-lon1);
  const a=Math.sin(dLat/2)**2 +
    Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}

function azimuth(lat1,lon1,lat2,lon2){
  const y=Math.sin(toRad(lon2-lon1))*Math.cos(toRad(lat2));
  const x=Math.cos(toRad(lat1))*Math.sin(toRad(lat2))-
          Math.sin(toRad(lat1))*Math.cos(toRad(lat2))*Math.cos(toRad(lon2-lon1));
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

function elevationAngle(userLat,userLon,planeLat,planeLon,altFt){
  const dist = haversine(userLat,userLon,planeLat,planeLon);
  const altM = altFt*0.3048;
  return Math.atan2(altM, dist)*180/Math.PI;
}

function angleDiff(a,b){
  return Math.abs(((a-b+540)%360)-180);
}

async function fetchPlanes(lat,lon,r){
  const res = await fetch(`https://api.airplanes.live/v2/point/${lat}/${lon}/${r}`);
  const j = await res.json();
  return j.ac || [];
}

async function capture(){
  const lat = parseFloat(document.getElementById("lat").value);
  const lon = parseFloat(document.getElementById("lon").value);
  const r = parseFloat(document.getElementById("radius").value);

  document.getElementById("status").innerText="Fetching...";

  const data = await fetchPlanes(lat,lon,r);

  data.forEach(p=>{
    if(!p.lat || !p.lon) return;

    const id = p.flight || p.hex;
    if(!tracks[id]) tracks[id]=[];

    tracks[id].push({
      lat:p.lat,
      lon:p.lon,
      alt:p.alt_baro || p.alt_geom || 0,
      time:Date.now()
    });

    if(tracks[id].length>10) tracks[id].shift();
  });

  draw();
  document.getElementById("status").innerText="Captured";
}

function draw(){
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  const cx = canvas.width/2;
  const cy = canvas.height/2;

  const targetAz = parseFloat(document.getElementById("az").value);
  const targetAlt = parseFloat(document.getElementById("alt").value);

  // draw target line
  ctx.strokeStyle="#facc15";
  ctx.lineWidth=3;

  const r = 200;
  const a = toRad(targetAz);

  ctx.beginPath();
  ctx.moveTo(cx,cy);
  ctx.lineTo(cx + Math.sin(a)*r, cy - Math.cos(a)*r);
  ctx.stroke();

  // draw tracks
  Object.values(tracks).forEach(track=>{
    for(let i=1;i<track.length;i++){

      const p1=track[i-1];
      const p2=track[i];

      const az1 = azimuth(
        parseFloat(lat.value),
        parseFloat(lon.value),
        p1.lat,p1.lon
      );

      const az2 = azimuth(
        parseFloat(lat.value),
        parseFloat(lon.value),
        p2.lat,p2.lon
      );

      const el1 = elevationAngle(lat.value,lon.value,p1.lat,p1.lon,p1.alt);
      const el2 = elevationAngle(lat.value,lon.value,p2.lat,p2.lon,p2.alt);

      const close =
        angleDiff(az2,targetAz)<5 &&
        Math.abs(el2-targetAlt)<5;

      ctx.strokeStyle = close ? "#22c55e" : "#64748b";
      ctx.lineWidth = close ? 3 : 1;

      ctx.beginPath();
      ctx.moveTo(cx + Math.sin(toRad(az1))*r*0.6, cy - Math.cos(toRad(az1))*r*0.6);
      ctx.lineTo(cx + Math.sin(toRad(az2))*r*0.6, cy - Math.cos(toRad(az2))*r*0.6);
      ctx.stroke();
    }
  });
}

function clearData(){
  tracks={};
  draw();
}
</script>

</body>
</html>
