<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>TransitChaser 3D Path Viewer</title>

  <style>
    body {
      margin: 0;
      background: #050914;
      color: white;
      font-family: system-ui, sans-serif;
      overflow: hidden;
    }

    #panel {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 320px;
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 16px;
      z-index: 10;
    }

    input, button {
      width: 100%;
      margin-top: 8px;
      padding: 9px;
      border-radius: 8px;
      border: 1px solid #475569;
      background: #0f172a;
      color: white;
      box-sizing: border-box;
    }

    button {
      cursor: pointer;
      background: #2563eb;
      font-weight: 700;
    }

    .small {
      font-size: 12px;
      color: #cbd5e1;
      margin-top: 10px;
      line-height: 1.4;
    }

    #stats {
      margin-top: 10px;
      font-size: 13px;
      color: #e2e8f0;
    }
  </style>

  <!-- ✅ IMPORT MAP (fixes your error) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>

<body>
  <div id="panel">
    <h2>TransitChaser 3D Path Viewer</h2>

    <label>Load path log JSON</label>
    <input type="file" id="fileInput" accept=".json" />

    <label>Sun Azimuth</label>
    <input id="sunAz" value="180" />

    <label>Sun Altitude</label>
    <input id="sunAlt" value="5" />

    <label>Moon Azimuth</label>
    <input id="moonAz" value="343" />

    <label>Moon Altitude</label>
    <input id="moonAlt" value="44" />

    <button id="updateButton">Update Sun/Moon</button>

    <div id="stats">No data loaded.</div>

    <div class="small">
      Viewer is at the centre.<br>
      Dome = sky above you.<br>
      Coloured paths = aircraft tracks.<br>
      Yellow = Sun. White = Moon.
    </div>
  </div>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";

    let scene, camera, renderer, controls;
    let pathGroup, sunMesh, moonMesh;

    const SKY_RADIUS = 100;

    init();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x050914);

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 90, 180);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;

      pathGroup = new THREE.Group();
      scene.add(pathGroup);

      addSkyDome();
      addCompass();
      addViewer();
      addLights();
      updateSunMoon();

      document.getElementById("updateButton").addEventListener("click", updateSunMoon);
      document.getElementById("fileInput").addEventListener("change", handleFileLoad);

      window.addEventListener("resize", onResize);

      animate();
    }

    function addLights() {
      scene.add(new THREE.AmbientLight(0xffffff, 0.7));
      const light = new THREE.DirectionalLight(0xffffff, 1);
      light.position.set(50, 100, 50);
      scene.add(light);
    }

    function addSkyDome() {
      const dome = new THREE.Mesh(
        new THREE.SphereGeometry(SKY_RADIUS, 64, 32, 0, Math.PI * 2, 0, Math.PI / 2),
        new THREE.MeshBasicMaterial({ color: 0x0f172a, wireframe: true, transparent: true, opacity: 0.25 })
      );
      scene.add(dome);
    }

    function addCompass() {
      [0,"N",90,"E",180,"S",270,"W"].forEach((v,i,a)=>{
        if(i%2===0) addDirectionLine(a[i],a[i+1]);
      });
    }

    function addDirectionLine(az,label){
      const p = skyTo3D(az,0);
      const line = new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),p]),
        new THREE.LineBasicMaterial({color:0x38bdf8})
      );
      scene.add(line);
    }

    function addViewer(){
      scene.add(new THREE.Mesh(
        new THREE.SphereGeometry(2.5,24,24),
        new THREE.MeshStandardMaterial({color:0x22c55e})
      ));
    }

    function skyTo3D(az,alt,r=SKY_RADIUS){
      const A=THREE.MathUtils.degToRad(az);
      const h=THREE.MathUtils.degToRad(alt);
      return new THREE.Vector3(
        Math.sin(A)*Math.cos(h)*r,
        Math.sin(h)*r,
        -Math.cos(A)*Math.cos(h)*r
      );
    }

    function updateSunMoon(){
      const sA=+sunAz.value,sH=+sunAlt.value;
      const mA=+moonAz.value,mH=+moonAlt.value;

      if(sunMesh) scene.remove(sunMesh);
      if(moonMesh) scene.remove(moonMesh);

      sunMesh=makeObj(sA,sH,0xfacc15,4);
      moonMesh=makeObj(mA,mH,0xe5e7eb,3);

      scene.add(sunMesh,moonMesh);
    }

    function makeObj(a,h,c,size){
      const m=new THREE.Mesh(
        new THREE.SphereGeometry(size,32,32),
        new THREE.MeshBasicMaterial({color:c})
      );
      m.position.copy(skyTo3D(a,h));
      return m;
    }

    async function handleFileLoad(e){
      const f=e.target.files[0];
      if(!f)return;
      const logs=JSON.parse(await f.text());
      renderFlightPaths(logs);
    }

    function renderFlightPaths(logs){
      pathGroup.clear();
      let count=0;

      logs.forEach(s=>{
        (s.aircraft||[]).forEach(a=>{
          if(!a.azimuth||!a.skyAltitude)return;

          const p=skyTo3D(a.azimuth,a.skyAltitude,altitudeToRadius(a.altitudeFt));
          const dot=new THREE.Mesh(
            new THREE.SphereGeometry(1,8,8),
            new THREE.MeshBasicMaterial({color:0x38bdf8})
          );
          dot.position.copy(p);
          pathGroup.add(dot);
          count++;
        });
      });

      stats.innerHTML=`Points: <b>${count}</b>`;
    }

    function altitudeToRadius(a){
      return 35+(Math.min(40000,a||0)/40000)*65;
    }

    function onResize(){
      camera.aspect=innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth,innerHeight);
    }

    function animate(){
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene,camera);
    }
  </script>
</body>
</html>
